name: Server Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version/tag for manual runs (for example v0.1.60)'
        required: false
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-server

jobs:
  metadata:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Resolve release version
        id: version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.version }}
        run: |
          if [ -z "$RELEASE_TAG" ]; then
            RELEASE_TAG="manual-${GITHUB_SHA::7}"
          fi

          VERSION="${RELEASE_TAG#v}"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building Jean server artifacts for $RELEASE_TAG"

  build-binaries:
    name: Build server binary (${{ matrix.arch }})
    needs: metadata
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: amd64
            asset: jean-server-linux-amd64
          - runner: ubuntu-22.04-arm
            arch: arm64
            asset: jean-server-linux-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          shared-key: server-${{ matrix.arch }}

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend bundle
        run: bun run build

      - name: Build jean-server
        run: cd src-tauri && cargo build --release --bin jean-server

      - name: Package binary
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
          ASSET: ${{ matrix.asset }}
        run: |
          mkdir -p artifacts
          cp src-tauri/target/release/jean-server "artifacts/${ASSET}"
          tar -C artifacts -czf "artifacts/${ASSET}-${VERSION}.tar.gz" "${ASSET}"
          shasum -a 256 "artifacts/${ASSET}-${VERSION}.tar.gz" > "artifacts/${ASSET}-${VERSION}.tar.gz.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: jean-server-linux-${{ matrix.arch }}
          path: |
            artifacts/*.tar.gz
            artifacts/*.sha256

      - name: Upload release assets
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
        run: |
          gh release upload "$RELEASE_TAG" artifacts/*.tar.gz artifacts/*.sha256 --clobber

  docker:
    name: Build and publish Docker image
    needs: metadata
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=raw,value=${{ needs.metadata.outputs.tag }}
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
