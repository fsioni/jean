name: Preflight

on:
  workflow_call:
    inputs:
      version:
        description: 'Optional release version without v prefix (e.g., 1.0.0)'
        required: false
        type: string
        default: ''

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            preflightArgs: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04'
            preflightArgs: ''
          - platform: 'ubuntu-22.04-arm'
            preflightArgs: ''
          - platform: 'windows-latest'
            preflightArgs: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Patch release version
        if: inputs.version != ''
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          echo "Patching version to $VERSION"
          node -e "const p=require('./package.json'); p.version='$VERSION'; require('fs').writeFileSync('package.json', JSON.stringify(p,null,2)+'\n')"
          node -e "const c=require('./src-tauri/tauri.conf.json'); c.version='$VERSION'; require('fs').writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(c,null,2)+'\n')"
          sed -i.bak "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml && rm -f src-tauri/Cargo.toml.bak

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils libfuse2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Bun cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS universal targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          shared-key: preflight-${{ matrix.platform }}

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Run quality checks
        run: bun run check:all

      - name: Build Tauri app without bundling
        run: bun run tauri build ${{ matrix.preflightArgs }} --no-bundle --ci
